<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COGITATOR // LIFE GOAL CORE</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --doom-red: #ff2e2e;
            --neon-green: #00ff41;
            --border-color: #ff2e2e;
            --font: "Courier New", Courier, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle, #1a0000 0%, #0a0a0a 100%);
            color: var(--doom-red);
            font-family: var(--font);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            letter-spacing: 1px;
        }

        /* Scanline Effect */
        body::after {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none; z-index: 1000;
        }

        header {
            padding: 15px 20px;
            border-bottom: 2px solid var(--doom-red);
            background: rgba(20, 0, 0, 0.9);
            box-shadow: 0 0 15px var(--doom-red);
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .brand { font-weight: bold; font-size: 16px; text-shadow: 0 0 8px var(--doom-red); }
        
        /* 🎯 LIFE GOAL DISPLAY */
        .objective-banner {
            border: 1px solid var(--neon-green);
            background: rgba(0, 255, 65, 0.05);
            padding: 8px 12px;
            color: var(--neon-green);
            font-size: 12px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .objective-label { font-weight: 900; background: var(--neon-green); color: #000; padding: 2px 5px; }

        #chat-flow {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .msg-wrapper { display: flex; width: 100%; }
        .msg-wrapper.user { justify-content: flex-end; }
        .bubble {
            max-width: 80%; padding: 15px; border: 1px solid transparent; font-size: 14px;
        }
        .ai .bubble {
            background: rgba(255, 46, 46, 0.1); border-color: var(--doom-red);
            box-shadow: inset 0 0 10px rgba(255, 46, 46, 0.1);
            clip-path: polygon(0 0, 100% 0, 100% 85%, 95% 100%, 0 100%);
        }
        .user .bubble {
            background: rgba(0, 255, 65, 0.05); border-color: var(--neon-green); color: var(--neon-green);
            clip-path: polygon(5% 0, 100% 0, 100% 100%, 0 100%, 0 15%);
        }

        /* DECISION CARD UPGRADE */
        .card {
            border: 1px solid var(--doom-red); background: rgba(25, 0, 0, 0.95);
            padding: 20px; box-shadow: 0 0 20px var(--doom-red); width: 100%; margin-top: 10px;
        }
        .card-h { font-weight: bold; border-bottom: 1px solid var(--doom-red); padding-bottom: 8px; margin-bottom: 12px; }
        .tag-row { display: flex; gap: 10px; margin-bottom: 15px; font-size: 11px; }
        .tag-alignment { background: var(--neon-green); color: #000; padding: 3px 8px; font-weight: bold; }
        .tag-risk { background: var(--doom-red); color: #fff; padding: 3px 8px; font-weight: bold; }
        
        .opt { background: rgba(255,255,255,0.03); padding: 12px; border: 1px solid #444; margin-bottom: 10px; }
        .opt-n { font-weight: bold; color: var(--doom-red); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .next-box { margin-top: 15px; color: #fff; font-size: 12px; font-style: italic; border-top: 1px dashed #666; padding-top: 10px; }

        #typing { padding: 0 20px 10px; font-size: 11px; color: var(--neon-green); display: none; }

        .controls { padding: 20px; background: #000; border-top: 2px solid var(--doom-red); }
        .p-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 11px; }
        select { background: #000; color: var(--doom-red); border: 1px solid var(--doom-red); font-family: var(--font); }
        .i-row { display: flex; gap: 10px; }
        input {
            flex: 1; background: #111; border: 1px solid #333; padding: 12px; color: var(--neon-green); font-family: var(--font); outline: none;
        }
        button {
            background: transparent; border: 1px solid var(--doom-red); color: var(--doom-red);
            padding: 0 20px; font-family: var(--font); font-weight: bold; cursor: pointer;
        }
        button:hover { background: var(--doom-red); color: #000; box-shadow: 0 0 10px var(--doom-red); }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="brand">COGITATOR // V5.2 OBJ_CORE</div>
            <div style="font-size: 10px; cursor: pointer; text-decoration: underline;" onclick="clearMem()">PURGE MEMORY</div>
        </div>
        <div class="objective-banner">
            <span class="objective-label">🎯 CURRENT OBJECTIVE</span>
            <span id="lifeGoal">NO ACTIVE OBJECTIVE DETECTED...</span>
        </div>
    </header>

    <div id="chat-flow">
        <div class="msg-wrapper ai">
            <div class="bubble">CORE ONLINE. 偵測到環境變量。請陳述您的「核心目標」。</div>
        </div>
    </div>

    <div id="typing">PROCESSOR ACTIVE...</div>

    <div class="controls">
        <div class="p-row">
            <div id="mode-lab">PROTOCOL: CALM</div>
            <select id="persona-select" onchange="updateMode()">
                <option value="calm">CALM</option>
                <option value="direct">DIRECT</option>
                <option value="aggressive">AGGRESSIVE</option>
            </select>
        </div>
        <div class="i-row">
            <input type="text" id="ui-input" placeholder="ENTER VARIABLES..." autocomplete="off">
            <button id="send-btn" onclick="send()">EXECUTE</button>
        </div>
    </div>

    <script>
        const ENDPOINT = "https://script.google.com/macros/s/AKfycbzfY_OcY4ve9BUruz8_S-oYlUX2WprHokDw37_wi4xw3SMYxkRp1_DTHEqOByAXZ0GEvA/exec";
        let userId = localStorage.getItem("cogitator_id") || ("CORE_" + Date.now());
        localStorage.setItem("cogitator_id", userId);

        let context = [];
        const flow = document.getElementById('chat-flow'), input = document.getElementById('ui-input'), btn = document.getElementById('send-btn');
        const typing = document.getElementById('typing'), pSelect = document.getElementById('persona-select'), goalDisplay = document.getElementById('lifeGoal');

        function updateMode() { document.getElementById("mode-lab").innerText = "PROTOCOL: " + pSelect.value.toUpperCase(); }
        function clearMem() { localStorage.removeItem("cogitator_id"); location.reload(); }
        function scroll() { flow.scrollTop = flow.scrollHeight; }

        function append(role, content, type = "text") {
            const wrap = document.createElement('div'); wrap.className = `msg-wrapper ${role}`;
            const bubble = document.createElement('div'); bubble.className = "bubble";

            if (type === "text") {
                bubble.textContent = content;
            } else if (type === "decision") {
                bubble.innerHTML = `
                    <div class="card">
                        <div class="card-h">+++ DECISION PACKET: ${content.title} +++</div>
                        <div class="tag-row">
                            <span class="tag-alignment">🎯 目標對齊: ${content.alignment}</span>
                            <span class="tag-risk">⚠️ 風險: ${content.risk}</span>
                        </div>
                        <div class="card-rec">${content.recommendation}</div>
                        ${content.options.map(o => `<div class="opt"><span class="opt-n">${o.name}</span><div style="font-size:11px;color:var(--neon-green)">✓ ${o.pros.join(' | ')}</div><div style="font-size:11px;color:var(--doom-red)">✕ ${o.cons.join(' | ')}</div></div>`).join('')}
                        <div class="next-box">>> SYSTEM COMMAND: ${content.next_action}</div>
                    </div>
                `;
            }
            wrap.appendChild(bubble); flow.appendChild(wrap); scroll();
        }

        async function send() {
            const val = input.value.trim(); if (!val) return;
            append("user", val); context.push({ role: "user", content: val });
            if (context.length > 10) context.shift();

            input.value = ""; btn.disabled = true; typing.style.display = "block"; scroll();

            try {
                const res = await fetch(ENDPOINT, {
                    method: "POST",
                    body: JSON.stringify({ message: val, context: context, persona: pSelect.value, userId: userId })
                });

                const data = await res.json();
                typing.style.display = "none";

                // UPDATE GOAL UI
                if (data.identity && data.identity.mainGoal) {
                    goalDisplay.innerText = data.identity.mainGoal;
                    goalDisplay.style.color = "var(--neon-green)";
                }

                if (data.type === "decision") {
                    append("ai", "SYNCHRONIZING GOALS... OPTIMAL PATH CALCULATED.");
                    await new Promise(r => setTimeout(r, 800));
                    append("ai", data, "decision");
                    context.push({ role: "ai", content: data.recommendation });
                } else {
                    append("ai", data.reply || "AWAITING FURTHER VARIABLES...");
                    context.push({ role: "ai", content: data.reply });
                }
                if (context.length > 10) context.shift();

            } catch (err) {
                typing.style.display = "none";
                append("ai", "ERROR: VOID CONNECTION. RE-DEPLOY CORE.");
            } finally {
                btn.disabled = false; input.focus();
            }
        }

        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
    </script>
</body>
</html>
