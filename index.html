<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COGITATOR // STABILITY PATCH V5.8</title>
    <style>
        /* --- 核心視覺：DOOM x 40K --- */
        :root {
            --bg: #0a0a0a;
            --red: #ff2e2e;
            --green: #00ff41;
            --font: "Courier New", Courier, monospace;
        }

        @keyframes flicker {
            0% { opacity: 0.9; } 5% { opacity: 0.7; } 100% { opacity: 1; }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg);
            background-image: radial-gradient(circle, #1a0000 0%, #0a0a0a 100%);
            color: var(--red);
            font-family: var(--font);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            letter-spacing: 1px;
        }

        /* 掃描線 */
        body::after {
            content: ""; position: absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%), 
                        linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.01), rgba(0,0,255,0.02));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 1000;
        }

        header {
            padding: 15px 20px;
            border-bottom: 2px solid var(--red);
            background: rgba(20,0,0,0.9);
            box-shadow: 0 0 15px var(--red);
            z-index: 10;
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .brand { font-weight: bold; text-shadow: 0 0 8px var(--red); animation: flicker 2s infinite; }
        
        .status-bar { 
            border: 1px solid var(--green); background: rgba(0,255,65,0.05); 
            padding: 5px 12px; color: var(--green); font-size: 11px; margin-top: 10px; 
            display: flex; justify-content: space-between;
        }

        .progress-track { background: #222; height: 4px; width: 100px; border: 1px solid var(--red); margin-left: 10px; }
        #progress-bar { background: var(--red); height: 100%; width: 0%; transition: width 0.5s; }

        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .msg-wrapper { display: flex; width: 100%; animation: fadeIn 0.3s forwards; }
        .msg-wrapper.user { justify-content: flex-end; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .bubble { max-width: 85%; padding: 15px; border: 1px solid transparent; font-size: 14px; line-height: 1.4; }
        .ai .bubble { background: rgba(255,46,46,0.1); border-color: var(--red); clip-path: polygon(0 0, 100% 0, 100% 90%, 95% 100%, 0 100%); }
        .user .bubble { background: rgba(0,255,65,0.05); border-color: var(--green); color: var(--green); clip-path: polygon(5% 0, 100% 0, 100% 100%, 0 100%, 0 10%); }

        /* 路徑卡片 */
        .path-card { 
            border: 1px solid var(--red); background: rgba(40,0,0,0.9); padding: 12px; 
            margin-top: 10px; cursor: pointer; transition: 0.2s;
        }
        .path-card:hover { background: var(--red); color: #000; }

        /* 任務卡片 */
        .quest-card {
            border: 2px solid var(--red); background: rgba(20,0,0,0.95); padding: 15px;
            box-shadow: 0 0 15px var(--red); margin-top: 10px;
        }

        .controls { padding: 20px; background: #000; border-top: 2px solid var(--red); }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid #333; padding: 12px; color: var(--green); font-family: var(--font); outline: none; }
        button { background: transparent; border: 1px solid var(--red); color: var(--red); padding: 0 20px; font-weight: bold; cursor: pointer; font-family: var(--font); }
        button:hover:not(:disabled) { background: var(--red); color: #000; }
        button:disabled { opacity: 0.3; }

        .typing-tag { font-size: 11px; color: var(--green); animation: flicker 0.5s infinite; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="brand">COGITATOR // CORE_V5.8</div>
            <div style="font-size: 10px; cursor: pointer;" onclick="purge()">[PURGE_MEMORY]</div>
        </div>
        <div class="status-bar">
            <div>TARGET: <span id="goal-txt" style="color:#fff">AWAITING...</span></div>
            <div style="display:flex; align-items:center;">
                SYNC: <div class="progress-track"><div id="progress-bar"></div></div>
            </div>
        </div>
    </header>

    <div id="chat-flow">
        <div class="msg-wrapper ai"><div class="bubble">CORE ONLINE. 正在等待變數輸入...</div></div>
    </div>

    <div class="controls">
        <div class="input-row">
            <input type="text" id="ui-input" placeholder="ENTER VARIABLES..." autocomplete="off">
            <button id="send-btn" onclick="send()">EXECUTE</button>
        </div>
    </div>

    <script>
        // 🎯 唯一宣告：不重複
        const ENDPOINT = "https://script.google.com/macros/s/AKfycbzfY_OcY4ve9BUruz8_S-oYlUX2WprHokDw37_wi4xw3SMYxkRp1_DTHEqOByAXZ0GEvA/exec";
        
        let userId = localStorage.getItem("cogitator_id") || ("CORE_" + Date.now());
        localStorage.setItem("cogitator_id", userId);

        let context = [];
        let loading = false;

        const flow = document.getElementById('chat-flow');
        const input = document.getElementById('ui-input');
        const btn = document.getElementById('send-btn');
        const goalTxt = document.getElementById('goal-txt');
        const progressUI = document.getElementById('progress-bar');

        function purge() { localStorage.removeItem("cogitator_id"); location.reload(); }
        function scroll() { flow.scrollTop = flow.scrollHeight; }

        function append(role, content, type = "text") {
            const wrap = document.createElement('div');
            wrap.className = `msg-wrapper ${role}`;
            const bubble = document.createElement('div');
            bubble.className = "bubble";

            if (type === "typing") {
                bubble.className = "typing-tag";
                bubble.textContent = content;
                wrap.appendChild(bubble);
                flow.appendChild(wrap);
                scroll();
                return wrap; // 返回元素引用以便刪除
            }

            if (type === "text") {
                bubble.textContent = content;
            } else if (type === "decision_paths") {
                let html = `<div>${content.lead}</div>`;
                content.paths.forEach(p => {
                    html += `<div class="path-card" onclick="choosePath('${p.id}')">▪ ${p.title}<br><small>${p.desc}</small></div>`;
                });
                bubble.innerHTML = html;
            } else if (type === "task") {
                bubble.innerHTML = `
                    <div class="quest-card">
                        <div style="font-weight:bold; border-bottom:1px solid var(--red); margin-bottom:10px;">+++ ACTIVE QUEST +++</div>
                        <div style="color:var(--green); font-size:12px; margin-bottom:5px;">OBJ: ${content.goal}</div>
                        <div style="color:#fff; padding:10px 0;">${content.task}</div>
                        <div style="font-size:10px; font-style:italic;">回報「我做好了」以推進進度。</div>
                    </div>
                `;
            }

            wrap.appendChild(bubble);
            flow.appendChild(wrap);
            scroll();
        }

        async function choosePath(id) {
            input.value = "我選擇 " + id;
            send();
        }

        async function send() {
            if (loading) return;
            const val = input.value.trim();
            if (!val) return;

            loading = true;
            btn.disabled = true;

            append("user", val);
            context.push({ role: "user", content: val });
            input.value = "";

            const typingIndicator = append("ai", "CORE PROCESSING...", "typing");

            try {
                // ✅ 穩定版 Fetch：無 Headers
                const res = await fetch(ENDPOINT, {
                    method: "POST",
                    body: JSON.stringify({ message: val, context: context, userId: userId })
                });

                const text = await res.text();
                
                // 移除 Typing
                if (typingIndicator) flow.removeChild(typingIndicator);

                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    append("ai", "系統回應格式異常，請重新嘗試。");
                    return;
                }

                // UI 更新
                if (data.identity && data.identity.mainGoal) goalTxt.innerText = data.identity.mainGoal;
                if (data.progress) progressUI.style.width = data.progress.percent + "%";

                // Fallback 處理
                if (!data.reply && !data.paths && !data.task) {
                    append("ai", "核心已接收，請繼續說明細節或卡點。");
                } else {
                    if (data.reply) append("ai", data.reply);
                    if (data.type === "decision_paths") append("ai", data, "decision_paths");
                    if (data.type === "task") append("ai", data, "task");
                }

                context.push({ role: "ai", content: data.reply || data.task || "ACK" });

            } catch (err) {
                if (typingIndicator) flow.removeChild(typingIndicator);
                append("ai", "連線失敗。請確認 GAS 已正確部署。");
            } finally {
                loading = false;
                btn.disabled = false;
                input.focus();
            }
        }

        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
    </script>
</body>
</html>
